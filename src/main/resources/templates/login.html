<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#main}, ~{::title},~{::script})}">
<head>
    <title>Login | SCM</title>
</head>

<body class="bg-stone-50">

    <div id="main" class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-6 py-12">

        <div class="w-full max-w-md bg-white border border-stone-200/80 rounded-2xl p-8 shadow-sm">
            
            <div class="text-center mb-8">
                <h2 class="text-2xl sm:text-3xl font-bold text-stone-900 tracking-tight">Welcome Back</h2>
                <p class="mt-2 text-stone-500 text-sm font-medium">Access your cloud contact book database</p>
            </div>

            <!-- Error Alerts -->
            <div class="mb-6 p-4 rounded-xl text-sm font-medium text-red-700 bg-red-50 border border-red-100 text-center" th:if="${param.error}">
                <i class="fa-solid fa-circle-exclamation mr-1.5 text-red-500"></i> Invalid email or password.
            </div>
            
            <div class="mb-6 p-4 rounded-xl text-sm font-medium text-emerald-700 bg-emerald-50 border border-emerald-100 text-center" th:if="${param.logout}">
                <i class="fa-solid fa-circle-check mr-1.5 text-emerald-500"></i> You have logged out successfully.
            </div>

            <!-- Session Flash Messages (e.g. registration success) -->
            <div data-th-replace="~{message::messagebox}"></div>

            <form id="loginForm" class="space-y-5" method="post" data-th-action="@{'/authenticate'}">

                <!-- Email Address -->
                <div>
                    <label class="block text-sm font-semibold text-stone-700 mb-2">Email Address</label>
                    <input name="email" type="email" required placeholder="name@example.com"
                           class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:border-stone-950 focus:ring-0 transition-colors minimal-input">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-semibold text-stone-700 mb-2">Password</label>
                    <input name="password" type="password" required placeholder="••••••••"
                           class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:border-stone-950 focus:ring-0 transition-colors minimal-input">
                </div>

                <!-- Submit Button -->
                <button type="submit"
                        id="loginSubmitBtn"
                        class="w-full py-3 bg-stone-950 hover:bg-stone-800 text-white font-semibold rounded-xl text-sm transition-all duration-200 shadow-sm shadow-stone-950/15 hover:-translate-y-0.5 flex items-center justify-center gap-2">
                    <svg id="loginSpinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span id="loginBtnText">Sign In</span>
                </button>

                <!-- Divider line -->
                <div class="relative flex items-center justify-center my-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-stone-100"></div>
                    </div>
                    <span class="relative bg-white px-3 text-xs font-semibold uppercase tracking-wider text-stone-400">or continue with</span>
                </div>

                <!-- OAuth Sign In -->
                <div class="social-button-container">
                    <a class="login-with-google-btn" data-th-href="@{'/oauth2/authorization/google'}">
                        Sign in with Google
                    </a>
                </div>

            </form>

            <div class="mt-8 text-center text-xs sm:text-sm font-medium text-stone-500">
                New to SCM? 
                <a data-th-href="@{'/signup'}" class="text-stone-950 hover:underline font-semibold ml-1">Create an account</a>
            </div>

        </div>

    </div>
<th:block th:fragment="script">
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('loginForm');
            const submitBtn = document.getElementById('loginSubmitBtn');
            const btnText = document.getElementById('loginBtnText');
            const btnSpinner = document.getElementById('loginSpinner');

            if (loginForm && submitBtn) {
                loginForm.addEventListener('submit', () => {
                    if (btnSpinner) btnSpinner.classList.remove('hidden');
                    if (btnText) btnText.textContent = 'Signing In...';
                    submitBtn.classList.add('opacity-80', 'pointer-events-none');
                    setTimeout(() => {
                        submitBtn.disabled = true;
                    }, 50);
                });
            }
        });
    </script>
</th:block>
</body>
</html>
