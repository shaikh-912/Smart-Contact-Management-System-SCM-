<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#main}, ~{::title})}">
<head>
    <title>Login page</title>
</head>

<body class="bg-gray-100">

    <!-- MAIN CONTENT JUST AFTER NAVBAR -->
    <div id="main" class="flex justify-center mt-4">

        <div class="bg-white w-full max-w-md p-8 rounded-2xl shadow-lg">
            <h2 class="text-3xl font-bold text-center text-gray-700 mb-6">Login</h2>
            <div class="text-red-500 text-center" th:if="${param.error}">
                        Invalid username and password.</div>
                    <div class="text-green-500 text-center"  th:if="${param.logout}">
                        You have been logged out.</div>
            <form class="space-y-5"
                method="post"
                data-th-action="@{'/authenticate'}"

            >

                <!-- Email -->
                <div>
                    <label class="block text-gray-600 font-medium mb-1">Email</label>
                    <input
                    name="email"
                        type="email"
                        class="w-full px-4 py-2 border rounded-lg border-gray-300
                        focus:border-blue-500 focus:ring-2 focus:ring-blue-400 focus:outline-none"
                        placeholder="Enter your email">
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-gray-600 font-medium mb-1">Password</label>
                    <input
                        name="password"
                        type="password"
                        class="w-full px-4 py-2 border rounded-lg border-gray-300
                        focus:border-blue-500 focus:ring-2 focus:ring-blue-400 focus:outline-none"
                        placeholder="Enter your password">
                </div>

                <!-- Button -->
                <button
                    class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold
                    hover:bg-blue-700 transition">
                    Login
                </button>
                <div class="social-button-container flex justify-center mt-5">
                    <a class="login-with-google-btn"
                     data-th-href="@{'/oauth2/authorization/google'}">Login With Google</a>
                </div>

            </form>
        </div>

    </div>

</body>
</html>
