<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#main}, ~{::title},~{::script})}">
<head>
    <title>Login | SCM</title>
</head>

<body class="bg-stone-50">

    <div id="main" class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-6 py-12">

        <div class="w-full max-w-sm bg-white border border-stone-200/80 rounded-2xl p-10 shadow-sm text-center">

            <!-- Logo / Icon -->
            <div class="flex items-center justify-center mb-6">
                <div class="h-14 w-14 bg-stone-950 text-white rounded-xl flex items-center justify-center font-bold text-2xl tracking-wider shadow-lg">S</div>
            </div>

            <div class="mb-8">
                <h1 class="text-2xl sm:text-3xl font-bold text-stone-900 tracking-tight">Welcome to SCM</h1>
                <p class="mt-2 text-stone-500 text-sm font-medium">Sign in with your Google account to continue</p>
            </div>

            <!-- Logout Message -->
            <div class="mb-6 p-4 rounded-xl text-sm font-medium text-emerald-700 bg-emerald-50 border border-emerald-100" th:if="${param.logout}">
                <i class="fa-solid fa-circle-check mr-1.5 text-emerald-500"></i> You have logged out successfully.
            </div>

            <!-- Session Flash Messages -->
            <div data-th-replace="~{message::messagebox}"></div>

            <!-- Google Sign In Button -->
            <a id="googleSignInBtn"
               data-th-href="@{'/oauth2/authorization/google'}"
               class="flex items-center justify-center gap-3 w-full py-3.5 px-6 bg-white border-2 border-stone-200 hover:border-stone-400 hover:bg-stone-50 text-stone-700 font-semibold rounded-xl text-sm transition-all duration-200 shadow-sm hover:shadow-md hover:-translate-y-0.5 group">
                <!-- Google G Logo SVG -->
                <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                <span>Sign in with Google</span>
            </a>

            <p class="mt-8 text-xs text-stone-400 font-medium leading-relaxed">
                By signing in, you agree to our terms of service.<br>Access is restricted to Google account holders.
            </p>

        </div>

    </div>
<th:block th:fragment="script"></th:block>
</body>
</html>
