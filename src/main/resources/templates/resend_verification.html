<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#main}, ~{::title},~{::script})}">
<head>
    <title>Resend Verification | SCM</title>
</head>

<body class="bg-stone-50">
    <div id="main" class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-6 py-12">

        <div class="w-full max-w-md bg-white border border-stone-200/80 rounded-2xl p-8 shadow-sm">

            <div class="text-center mb-8">
                <div class="flex items-center justify-center mb-4">
                    <div class="h-14 w-14 bg-stone-100 rounded-2xl flex items-center justify-center">
                        <i class="fa-solid fa-envelope text-stone-700 text-2xl"></i>
                    </div>
                </div>
                <h2 class="text-2xl sm:text-3xl font-bold text-stone-900 tracking-tight">Resend Verification Email</h2>
                <p class="mt-2 text-stone-500 text-sm font-medium">Enter your registered email and we'll send a fresh verification link</p>
            </div>

            <!-- Flash Messages -->
            <div class="mb-6">
                <div data-th-replace="~{message::messagebox}"></div>
            </div>

            <form id="resendForm" action="/auth/resend-verification" method="post" class="space-y-5">

                <div>
                    <label class="block text-sm font-semibold text-stone-700 mb-2">Email Address</label>
                    <input type="email" name="email" required placeholder="you@example.com"
                           class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:border-stone-950 focus:ring-0 transition-colors minimal-input">
                </div>

                <button type="submit"
                        id="resendBtn"
                        class="w-full py-3 bg-stone-950 hover:bg-stone-800 text-white font-semibold rounded-xl text-sm transition-all duration-200 shadow-sm shadow-stone-950/15 hover:-translate-y-0.5 flex items-center justify-center gap-2">
                    <svg id="resendSpinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span id="resendBtnText">Send Verification Link</span>
                </button>

            </form>

            <div class="mt-8 text-center text-xs sm:text-sm font-medium text-stone-500">
                Already verified?
                <a data-th-href="@{'/login'}" class="text-stone-950 hover:underline font-semibold ml-1">Sign In</a>
            </div>

        </div>

    </div>
    <th:block th:fragment="script">
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const form = document.getElementById('resendForm');
                const btn = document.getElementById('resendBtn');
                const btnText = document.getElementById('resendBtnText');
                const spinner = document.getElementById('resendSpinner');
                if (form && btn) {
                    form.addEventListener('submit', () => {
                        spinner.classList.remove('hidden');
                        btnText.textContent = 'Sending...';
                        btn.classList.add('opacity-80', 'pointer-events-none');
                        setTimeout(() => { btn.disabled = true; }, 50);
                    });
                }
            });
        </script>
    </th:block>
</body>
</html>
