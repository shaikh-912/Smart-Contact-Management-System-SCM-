<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 — Server Error | SCM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{'/css/output.css'}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" th:href="@{'/css/style.css'}">
</head>
<body class="font-sans antialiased bg-stone-50 text-stone-900 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-lg text-center">

        <!-- Icon Badge -->
        <div class="inline-flex items-center justify-center w-24 h-24 rounded-3xl bg-rose-50 border border-rose-100 mb-6 mx-auto">
            <i class="fa-solid fa-triangle-exclamation text-4xl text-rose-400"></i>
        </div>

        <!-- Large Error Number -->
        <h1 class="text-8xl font-black text-stone-200 leading-none tracking-tighter select-none">500</h1>

        <!-- Title & Message -->
        <h2 class="mt-2 text-2xl font-bold text-stone-900 tracking-tight" th:text="${errorTitle}">Something Went Wrong</h2>
        <p class="mt-3 text-sm text-stone-500 font-medium leading-relaxed max-w-sm mx-auto"
           th:text="${errorMessage}">
            An unexpected error occurred. Please try again later.
        </p>

        <!-- Detail (collapsed, dev info) -->
        <details class="mt-4 text-xs text-stone-400 text-left bg-stone-50 border border-stone-200 rounded-xl p-4 max-w-sm mx-auto" th:if="${errorDetail}">
            <summary class="cursor-pointer font-semibold text-stone-500 select-none">Technical details</summary>
            <p class="mt-2 font-mono break-words" th:text="${errorDetail}"></p>
        </details>

        <!-- Action Buttons -->
        <div class="mt-8 flex flex-col sm:flex-row items-center justify-center gap-3">
            <a href="/"
               class="inline-flex items-center gap-2 px-6 py-3 bg-stone-950 hover:bg-stone-800 text-white font-semibold rounded-xl text-sm transition-all shadow-sm">
                <i class="fa-solid fa-house text-xs"></i> Back to Home
            </a>
            <button onclick="location.reload()"
                    class="inline-flex items-center gap-2 px-6 py-3 border border-stone-200 hover:bg-stone-100 text-stone-600 font-semibold rounded-xl text-sm transition-all">
                <i class="fa-solid fa-arrows-rotate text-xs"></i> Try Again
            </button>
        </div>

        <!-- Footer hint -->
        <p class="mt-10 text-xs text-stone-300 font-semibold uppercase tracking-widest">SCM Enterprise · Error 500</p>
    </div>

</body>
</html>
