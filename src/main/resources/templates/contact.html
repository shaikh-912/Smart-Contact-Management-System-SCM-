<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#main}, ~{::title},~{::script})}">
<head>
    <title>Contact Support | SCM</title>
</head>

<body>
  <div id="main">
    <section class="py-16 md:py-24 bg-stone-50">
      <div class="max-w-2xl mx-auto px-6">
        
        <h1 class="text-3xl font-bold text-stone-900 tracking-tight mb-3">Get in Touch</h1>
        <p class="text-stone-500 font-medium mb-10 leading-relaxed">
          Have questions about SCM, OAuth setup, database storage integrations, or cloud photo services? Send us a message and our team will get back to you.
        </p>

        <!-- Flash Messages -->
        <div data-th-replace="~{message::messagebox}"></div>

        <!-- Form -->
        <form class="space-y-6" 
              method="post" 
              th:action="@{/contact/submit}" 
              th:object="${supportContactForm}">
          
          <!-- Full Name -->
          <div>
            <label class="block text-sm font-semibold text-stone-700 mb-2">Full Name</label>
            <input type="text" th:field="*{name}" placeholder="John Doe" required
                   class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:border-stone-950 focus:ring-0 transition-colors minimal-input">
          </div>

          <!-- Email Address -->
          <div>
            <label class="block text-sm font-semibold text-stone-700 mb-2">Email Address</label>
            <input type="email" th:field="*{email}" placeholder="john@example.com" required
                   class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:border-stone-950 focus:ring-0 transition-colors minimal-input">
          </div>

          <!-- Message Body -->
          <div>
            <label class="block text-sm font-semibold text-stone-700 mb-2">Your Message</label>
            <textarea rows="5" th:field="*{message}" placeholder="How can we assist you?" required
                      class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:border-stone-950 focus:ring-0 transition-colors minimal-input resize-none"></textarea>
          </div>

          <!-- Submit Button -->
          <button type="submit" 
                  class="w-full py-3 bg-stone-950 hover:bg-stone-800 text-white font-semibold rounded-xl text-sm transition-all shadow-sm">
            Send Message
          </button>

        </form>

      </div>
    </section>
  </div>
  <th:block th:fragment="script"></th:block>
</body>
</html>
