<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#main}, ~{::title},~{::script})}">
<head>
    <title>Sign Up | SCM</title>
</head>

<body class="bg-stone-50">
    <div id="main" class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-6 py-12">
        
        <div class="w-full max-w-lg bg-white border border-stone-200/80 rounded-2xl p-8 shadow-sm">
            
            <div class="text-center mb-8">
                <h2 class="text-2xl sm:text-3xl font-bold text-stone-900 tracking-tight">Create an Account</h2>
                <p class="mt-2 text-stone-500 text-sm font-medium">Join SCM and organize your network coordinates</p>
            </div>

            <!-- Messages (Signup feedback) -->
            <div class="mb-6">
                <div data-th-replace="~{message::messagebox}"></div>
            </div>

            <form id="signupForm" data-th-action="@{'/do-signup'}" method="post" novalidate data-th-object="${userForm}" class="space-y-5">
                
                <!-- Name -->
                <div>
                    <label class="block text-sm font-semibold text-stone-700 mb-2">Full Name</label>
                    <input type="text" name="name" data-th-field="*{name}" required placeholder="Your full name"
                           class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:border-stone-950 focus:ring-0 transition-colors minimal-input">
                    <p data-th-if="${#fields.hasErrors('name')}" data-th-errors="*{name}"
                       class="text-xs font-semibold text-red-500 mt-1.5"></p>
                </div>

                <!-- Email -->
                <div>
                    <label class="block text-sm font-semibold text-stone-700 mb-2">Email Address</label>
                    <input type="email" name="email" data-th-field="*{email}" required placeholder="you@example.com"
                           class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:border-stone-950 focus:ring-0 transition-colors minimal-input">
                    <p data-th-if="${#fields.hasErrors('email')}" data-th-errors="*{email}"
                       class="text-xs font-semibold text-red-500 mt-1.5"></p>
                </div>

                <!-- Password -->
                <div>
                    <label class="block text-sm font-semibold text-stone-700 mb-2">Password</label>
                    <input type="password" name="password" data-th-field="*{password}" required placeholder="••••••••"
                           class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:border-stone-950 focus:ring-0 transition-colors minimal-input">
                    <p data-th-if="${#fields.hasErrors('password')}" data-th-errors="*{password}"
                       class="text-xs font-semibold text-red-500 mt-1.5"></p>
                </div>

                <!-- Phone -->
                <div>
                    <label class="block text-sm font-semibold text-stone-700 mb-2">Phone Number</label>
                    <input type="tel" name="phone" data-th-field="*{phoneNumber}" placeholder="+91 98765 43210"
                           class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:border-stone-950 focus:ring-0 transition-colors minimal-input">
                    <p data-th-if="${#fields.hasErrors('phoneNumber')}" data-th-errors="*{phoneNumber}"
                       class="text-xs font-semibold text-red-500 mt-1.5"></p>
                </div>

                <!-- About -->
                <div>
                    <label class="block text-sm font-semibold text-stone-700 mb-2">About Yourself</label>
                    <textarea name="about" data-th-field="*{about}" rows="3" placeholder="Tell us a little about yourself..."
                              class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:border-stone-950 focus:ring-0 transition-colors minimal-input resize-none"></textarea>
                    <p data-th-if="${#fields.hasErrors('about')}" data-th-errors="*{about}"
                       class="text-xs font-semibold text-red-500 mt-1.5"></p>
                </div>

                <!-- Submit / Reset Buttons -->
                <div class="flex items-center gap-4 pt-4">
                    <button type="submit"
                            id="submitBtn"
                            class="flex-1 py-3 bg-stone-950 hover:bg-stone-800 text-white font-semibold rounded-xl text-sm transition-all duration-200 shadow-sm shadow-stone-950/15 hover:-translate-y-0.5 flex items-center justify-center gap-2">
                        <svg id="btnSpinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span id="btnText">Create Account</span>
                    </button>
                    <button type="reset"
                            class="px-6 py-3 border border-stone-250 hover:bg-stone-50 text-stone-600 font-semibold rounded-xl text-sm transition-all">
                        Reset
                    </button>
                </div>

            </form>

            <div class="mt-8 text-center text-xs sm:text-sm font-medium text-stone-500">
                Already have an account? 
                <a data-th-href="@{'/login'}" class="text-stone-950 hover:underline font-semibold ml-1">Sign In</a>
            </div>

        </div>

    </div>
    <th:block th:fragment="script">
        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const signupForm = document.getElementById('signupForm');
                const submitBtn = document.getElementById('submitBtn');
                const btnText = document.getElementById('btnText');
                const btnSpinner = document.getElementById('btnSpinner');

                if (signupForm && submitBtn) {
                    signupForm.addEventListener('submit', () => {
                        if (btnSpinner) btnSpinner.classList.remove('hidden');
                        if (btnText) btnText.textContent = 'Creating Account...';
                        submitBtn.classList.add('opacity-80', 'pointer-events-none');
                        setTimeout(() => {
                            submitBtn.disabled = true;
                        }, 50);
                    });
                }
            });
        </script>
    </th:block>
</body>
</html>
