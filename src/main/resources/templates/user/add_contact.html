<!DOCTYPE html>
<html lang="en"
      th:replace="~{base :: parent(~{::#main}, ~{::title})}">
<head>
    <title>Add Contact | SCM</title>
</head>

<body>

<div id="main">

    <!-- Sidebar -->
    <div th:replace="~{user/sidebar::sidebar}"></div>

    <!-- Navbar -->
    <div th:replace="~{user/user_navbar::user-navbar}"></div>

    <!-- Main Content -->
    <main class="mt-16 sm:ml-64 p-3 sm:p-6">

        <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg p-4 sm:p-6 md:p-8">

            <!-- Header -->
            <div data-th-replace="~{message::messagebox}"></div>
            <div class="mb-8">
                <h1 class="text-3xl font-bold text-gray-800">
                    Add New Contact
                </h1>

                <p class="mt-2 text-gray-500">
                    This contact will be stored on cloud. You can manage and contact them anytime.
                </p>
            </div>

            <!-- Form -->
            <form th:action="@{/user/contacts/add}"
            	  th:object="${contactForm}"
                  method="post"
                  enctype="multipart/form-data"
                  class="space-y-6">

                <!-- Name -->
                <div>
                    <label class="block mb-2 font-medium text-gray-700">
                        Contact Name
                    </label>

                    <div class="relative">
                        <i class="fa-regular fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>

                        <input
                        		th:field="*{name}"
                                type="text"
                                name="name"
                                placeholder="Enter Contact Name"
                                class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                required="required">
                    </div>
                </div>

                <!-- Email -->
                <div>
                    <label class="block mb-2 font-medium text-gray-700">
                        Contact Email
                    </label>

                    <div class="relative">
                        <i class="fa-regular fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>

                        <input
                        		th:field="*{email}"
                                type="email"
                                name="email"
                                placeholder="example@gmail.com"
                                class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                required>
                    </div>
                </div>

                <!-- Phone -->
                <div>
                    <label class="block mb-2 font-medium text-gray-700">
                        Contact Phone
                    </label>

                    <div class="relative">
                        <i class="fa-solid fa-phone absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>

                        <input
                        		th:field="*{phoneNumber}"
                                type="tel"
                                name="phone"
                                placeholder="9876543210"
                                class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                required>
                    </div>
                </div>

                <!-- Address -->
                <div>
                    <label class="block mb-2 font-medium text-gray-700">
                        Contact Address
                    </label>

                    <textarea
                    		th:field="*{address}"
                            name="address"
                            rows="4"
                            placeholder="Address of the contact"
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none"
                            required="required"></textarea>
                </div>

                <!-- Description -->
                <div>
                    <label class="block mb-2 font-medium text-gray-700">
                        Contact Description
                    </label>

                    <textarea
                    		th:field="*{description}"
                            name="description"
                            rows="5"
                            placeholder="Write about your contact"
                            class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none resize-none"></textarea>
                </div>

                <!-- Website & LinkedIn -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

                    <!-- Website -->
                    <div class="relative">
                        <i class="fa-solid fa-globe absolute left-3 top-1/2 -translate-y-1/2 text-gray-500"></i>

                        <input
                        		th:field="*{webSiteLink}"
                                type="url"
                                name="websiteLink"
                                placeholder="https://website.com"
                                class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                                required>
                    </div>

                    <!-- LinkedIn -->
                    <div class="relative">
                        <i class="fa-brands fa-linkedin absolute left-3 top-1/2 -translate-y-1/2 text-blue-600"></i>

                        <input
                        		th:field="*{linkedInLink}"
                                type="url"
                                name="linkedInLink"
                                placeholder="https://linkedin.com/in/username"
                                class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>

                </div>

                <!-- Image Upload -->
                <div>
                    <label class="block mb-2 font-medium text-gray-700">
                        Contact Image
                    </label>

                    <input
                    		th:field="*{contactImage}"
                            type="file"
                            name="contactImage"
                            class="block w-full text-sm text-gray-900 border border-gray-300 rounded-lg cursor-pointer bg-gray-50 p-2">
                </div>

                <!-- Favorite -->
            <div class="flex items-center">
			    <input
			        th:field="*{favorite}"
			        type="checkbox"
			        value="true"
			        class="w-4 h-4 text-blue-600 bg-gray-200 border-gray-300 rounded focus:ring-blue-500">
			
			    <label for="favorite"
			           class="ms-2 text-sm font-medium text-gray-900">
			        Is this contact your favorite one?
			    </label>
			</div>

                <!-- Buttons -->
                <div class="flex flex-col sm:flex-row gap-4 pt-4">

                    <button
                            type="submit"
                            class="w-full sm:w-auto px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition">
                        <i class="fa-solid fa-floppy-disk mr-2"></i>
                        Save Contact
                    </button>

                    <button
                            type="reset"
                            class="w-full sm:w-auto px-6 py-3 bg-gray-600 text-white rounded-lg hover:bg-gray-700 transition">
                        <i class="fa-solid fa-rotate-left mr-2"></i>
                        Reset
                    </button>

                </div>

            </form>

        </div>

    </main>

</div>

</body>
</html>
