<!DOCTYPE html>
<html lang="en"
      th:replace="~{base :: parent(~{::#main}, ~{::title})}">
<head>
    <title th:text="${user.name} + ' | SCM'"></title>
</head>

<body>

<div id="main">

    <!-- Sidebar -->
    <div th:replace="~{user/sidebar::sidebar}"></div>

    <!-- Navbar -->
    <div th:replace="~{user/user_navbar::user-navbar}"></div>

    <!-- Main Content -->
    <main class="p-4 sm:ml-64 mt-16">

        <div class="p-6 border rounded-lg bg-white shadow">

            <h1 class="text-3xl font-bold">
                Welcome,
                <span th:text="${user.name}"></span>
            </h1>

            <p class="mt-3 text-gray-600">
                Profile page content goes here.
            </p>

        </div>

    </main>

</div>

</body>
</html>
