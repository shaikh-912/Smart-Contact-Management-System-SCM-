<aside th:fragment="sidebar" id="logo-sidebar"
    class="fixed top-0 left-0 z-40 w-64 h-screen pt-20 transition-transform -translate-x-full bg-white border-r border-stone-200/80 sm:translate-x-0 dark:bg-stone-900 dark:border-stone-800"
    aria-label="Sidebar">

    <div class="h-full px-4 pb-6 overflow-y-auto bg-white dark:bg-stone-900 flex flex-col justify-between">

        <div class="space-y-6">

            <!-- Branding inside sidebar header on desktop -->
            <div class="hidden sm:flex items-center gap-2.5 px-2 pb-4 border-b border-stone-100">
                <div
                    class="h-8 w-8 bg-stone-950 text-white rounded-md flex items-center justify-center font-bold text-base">
                    S</div>
                <span class="text-xl font-bold tracking-tight text-stone-900">SCM Portal</span>
            </div>

            <!-- Main Menu Links -->
            <ul class="space-y-1 font-medium">

                <!-- Dashboard -->
                <li>
                    <a th:href="@{/user/dashboard}"
                        th:class="${currentPath == '/user/dashboard' ? 'bg-stone-50 text-stone-950 border-stone-900' : 'text-stone-500 hover:bg-stone-50/50 hover:text-stone-950 border-transparent'}"
                        class="flex items-center gap-3 px-3 py-2.5 text-sm font-semibold rounded-xl border-l-2 transition-all group">
                        <i
                            class="fa-solid fa-chart-line text-base text-stone-400 group-hover:text-stone-800 transition-colors"></i>
                        <span>Dashboard</span>
                    </a>
                </li>

                <!-- Profile -->
                <li>
                    <a th:href="@{/user/profile}"
                        th:class="${currentPath == '/user/profile' ? 'bg-stone-50 text-stone-950 border-stone-900' : 'text-stone-500 hover:bg-stone-50/50 hover:text-stone-950 border-transparent'}"
                        class="flex items-center gap-3 px-3 py-2.5 text-sm font-semibold rounded-xl border-l-2 transition-all group">
                        <i
                            class="fa-regular fa-id-card text-base text-stone-400 group-hover:text-stone-800 transition-colors"></i>
                        <span>My Profile</span>
                    </a>
                </li>

                <!-- Add Contact -->
                <li>
                    <a th:href="@{/user/contacts/add}"
                        th:class="${currentPath == '/user/contacts/add' ? 'bg-stone-50 text-stone-950 border-stone-900' : 'text-stone-500 hover:bg-stone-50/50 hover:text-stone-950 border-transparent'}"
                        class="flex items-center gap-3 px-3 py-2.5 text-sm font-semibold rounded-xl border-l-2 transition-all group">
                        <i
                            class="fa-solid fa-user-plus text-base text-stone-400 group-hover:text-stone-800 transition-colors"></i>
                        <span>Add Contact</span>
                    </a>
                </li>

                <!-- Contacts -->
                <li>
                    <a th:href="@{/user/contacts}"
                        th:class="${currentPath == '/user/contacts' || currentPath == '/user/contacts/search' ? 'bg-stone-50 text-stone-950 border-stone-900' : 'text-stone-500 hover:bg-stone-50/50 hover:text-stone-950 border-transparent'}"
                        class="flex items-center gap-3 px-3 py-2.5 text-sm font-semibold rounded-xl border-l-2 transition-all group">
                        <i
                            class="fa-regular fa-address-book text-base text-stone-400 group-hover:text-stone-800 transition-colors"></i>
                        <span>Contact Book</span>
                    </a>
                </li>

            </ul>
        </div>

        <!-- Footer indicator inside sidebar -->
        <div
            class="px-2 py-4 border-t border-stone-100 text-[10px] text-stone-400 font-bold uppercase tracking-wider text-center sm:text-left">
            SCM Enterprise v1.0
        </div>

    </div>
</aside>
