<!DOCTYPE html>
<html lang="en"
      th:replace="~{base :: parent(~{::#main}, ~{::title},~{::script})}">
<head>
    <title>Update Contact | SCM</title>
</head>

<body class="bg-stone-50">

<div id="main">

    <!-- Sidebar -->
    <div th:replace="~{user/sidebar::sidebar}"></div>

    <!-- Navbar -->
    <div th:replace="~{user/user_navbar::user-navbar}"></div>

    <!-- Main Content -->
    <main class="mt-16 sm:ml-64 p-6 bg-stone-50 min-h-screen">

        <div class="max-w-3xl mx-auto">

            <!-- Header -->
            <div class="mb-8 flex items-center gap-4">
                <a th:href="@{/user/contacts}"
                   class="inline-flex items-center justify-center w-9 h-9 rounded-xl border border-stone-200 hover:bg-stone-50 text-stone-500 hover:text-stone-950 transition-colors">
                    <i class="fa-solid fa-arrow-left text-sm"></i>
                </a>
                <div>
                    <h1 class="text-3xl font-bold text-stone-900 tracking-tight">Update Contact</h1>
                    <p class="mt-1 text-sm text-stone-500 font-medium">Edit and save changes to an existing contact</p>
                </div>
            </div>

            <!-- Feedbacks -->
            <div class="mb-6">
                <div data-th-replace="~{message::messagebox}"></div>
            </div>

            <!-- Card Form Panel -->
            <div class="bg-white border border-stone-200/80 rounded-2xl p-6 sm:p-8 shadow-sm">

                <form th:action="@{'/user/contacts/update/' + ${contactId}}"
                      th:object="${contactForm}"
                      method="post"
                      enctype="multipart/form-data"
                      class="space-y-6">

                    <!-- Name -->
                    <div>
                        <label class="block text-sm font-semibold text-stone-700 mb-2">Contact Name</label>
                        <div class="relative">
                            <i class="fa-regular fa-user absolute left-4 top-1/2 -translate-y-1/2 text-stone-400"></i>
                            <input th:field="*{name}" type="text" required placeholder="Full Name"
                                   class="w-full pl-11 pr-4 py-3 border border-stone-200 rounded-xl focus:border-stone-950 focus:ring-0 transition-colors minimal-input text-sm">
                        </div>
                    </div>

                    <!-- Email & Phone Grouped in Grid -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <!-- Email -->
                        <div>
                            <label class="block text-sm font-semibold text-stone-700 mb-2">Email Address</label>
                            <div class="relative">
                                <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-stone-400"></i>
                                <input th:field="*{email}" type="email" required placeholder="name@example.com"
                                       class="w-full pl-11 pr-4 py-3 border border-stone-200 rounded-xl focus:border-stone-950 focus:ring-0 transition-colors minimal-input text-sm">
                            </div>
                        </div>

                        <!-- Phone -->
                        <div>
                            <label class="block text-sm font-semibold text-stone-700 mb-2">Phone Number</label>
                            <div class="relative">
                                <i class="fa-solid fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-stone-400"></i>
                                <input th:field="*{phoneNumber}" type="tel" required placeholder="98765 43210"
                                       class="w-full pl-11 pr-4 py-3 border border-stone-200 rounded-xl focus:border-stone-950 focus:ring-0 transition-colors minimal-input text-sm">
                            </div>
                        </div>
                    </div>

                    <!-- Address -->
                    <div>
                        <label class="block text-sm font-semibold text-stone-700 mb-2">Contact Address</label>
                        <textarea th:field="*{address}" rows="3" placeholder="Street address, city, country..."
                                  class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:border-stone-950 focus:ring-0 transition-colors minimal-input text-sm resize-none"></textarea>
                    </div>

                    <!-- Description -->
                    <div>
                        <label class="block text-sm font-semibold text-stone-700 mb-2">Description / Notes</label>
                        <textarea th:field="*{description}" rows="3" placeholder="Context, details, background info..."
                                  class="w-full px-4 py-3 border border-stone-200 rounded-xl focus:border-stone-950 focus:ring-0 transition-colors minimal-input text-sm resize-none"></textarea>
                    </div>

                    <!-- Social Links Grid -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <!-- Website -->
                        <div>
                            <label class="block text-sm font-semibold text-stone-700 mb-2">Personal Website</label>
                            <div class="relative">
                                <i class="fa-solid fa-globe absolute left-4 top-1/2 -translate-y-1/2 text-stone-400"></i>
                                <input th:field="*{webSiteLink}" type="url" placeholder="https://example.com"
                                       class="w-full pl-11 pr-4 py-3 border border-stone-200 rounded-xl focus:border-stone-950 focus:ring-0 transition-colors minimal-input text-sm">
                            </div>
                        </div>

                        <!-- LinkedIn -->
                        <div>
                            <label class="block text-sm font-semibold text-stone-700 mb-2">LinkedIn Profile</label>
                            <div class="relative">
                                <i class="fa-brands fa-linkedin absolute left-4 top-1/2 -translate-y-1/2 text-stone-400"></i>
                                <input th:field="*{linkedInLink}" type="url" placeholder="https://linkedin.com/in/username"
                                       class="w-full pl-11 pr-4 py-3 border border-stone-200 rounded-xl focus:border-stone-950 focus:ring-0 transition-colors minimal-input text-sm">
                            </div>
                        </div>
                    </div>

                    <!-- Image Upload with existing preview -->
                    <div>
                        <label class="block text-sm font-semibold text-stone-700 mb-2">Contact Image / Photo</label>

                        <!-- Existing picture thumbnail -->
                        <div th:if="${existingPicture != null and existingPicture != ''}"
                             class="flex items-center gap-4 mb-3 p-3 bg-stone-50 border border-stone-200 rounded-xl">
                            <img th:src="${existingPicture}"
                                 onerror="this.src='https://as1.ftcdn.net/jpg/07/24/59/76/1000_F_724597608_pmo5BsVumFcFyHJKlASG2Y2KpkkfiYUU.webp'"
                                 alt="Current photo"
                                 class="w-14 h-14 rounded-full object-cover border border-stone-200 shrink-0">
                            <div>
                                <p class="text-xs font-semibold text-stone-700">Current photo</p>
                                <p class="text-xs text-stone-400 mt-0.5">Upload a new file below to replace it</p>
                            </div>
                        </div>

                        <input th:field="*{contactImage}" type="file" accept="image/*"
                               class="block w-full text-xs text-stone-500 border border-stone-200 rounded-xl cursor-pointer bg-stone-50 p-2.5 hover:bg-stone-100 transition-colors">
                    </div>

                    <!-- Favorite Star Checkbox -->
                    <div class="flex items-center gap-3 py-2">
                        <input th:field="*{favorite}" type="checkbox" id="favorite"
                               class="w-4.5 h-4.5 text-stone-900 border-stone-200 rounded-md focus:ring-stone-950 focus:ring-0">
                        <label for="favorite" class="text-sm font-semibold text-stone-700 cursor-pointer">
                            Mark this contact as a favorite
                        </label>
                    </div>

                    <!-- Save / Cancel Actions -->
                    <div class="flex items-center gap-4 pt-4 border-t border-stone-100">
                        <button type="submit"
                                class="px-6 py-3 bg-stone-950 hover:bg-stone-800 text-white font-semibold rounded-xl text-sm transition-all duration-200 shadow-sm hover:-translate-y-0.5">
                            <i class="fa-solid fa-floppy-disk mr-2"></i> Save Changes
                        </button>
                        <a th:href="@{/user/contacts}"
                           class="px-6 py-3 border border-stone-200 hover:bg-stone-50 text-stone-600 font-semibold rounded-xl text-sm transition-all">
                            <i class="fa-solid fa-xmark mr-2"></i> Cancel
                        </a>
                    </div>

                </form>

            </div>

        </div>

    </main>

</div>
<th:block th:fragment="script"></th:block>
</body>
</html>
