<div th:fragment="contactModal">

    <!-- Modal Background Overlay with Blur -->
    <div id="view-contact-modal"
         class="hidden fixed inset-0 z-50 flex items-center justify-center bg-stone-950/40 backdrop-blur-sm p-4 transition-all duration-300"
         role="dialog"
         aria-modal="true"
         aria-labelledby="modalName">

        <!-- Modal Card Container -->
        <div class="relative w-full max-w-md max-h-[90vh] overflow-y-auto bg-white border border-stone-200/80 rounded-2xl shadow-xl animate-fade-in mx-auto">

            <!-- Header Panel -->
            <div class="relative h-24 bg-stone-50 border-b border-stone-100 flex items-center justify-center">
                <!-- Close Button -->
                <button id="closeModalTop" type="button" aria-label="Close"
                        class="absolute top-4 right-4 flex items-center justify-center w-8 h-8 rounded-full border border-stone-200 bg-white hover:bg-stone-50 text-stone-500 hover:text-stone-950 transition-colors shadow-xs">
                    <i class="fa-solid fa-xmark text-sm"></i>
                </button>

                <!-- Profile Avatar Circle -->
                <div class="absolute -bottom-10 left-1/2 -translate-x-1/2 w-20 h-20 rounded-full border-4 border-white bg-stone-50 shadow-md overflow-hidden shrink-0">
                    <img id="modalImage" src="" alt="Contact Photo"
                         class="w-full h-full object-cover">
                </div>
            </div>

            <!-- Profile Info Body -->
            <div class="pt-12 px-6 pb-6 text-center">

                <!-- Main Name & Subtitles -->
                <div class="mb-6">
                    <h2 id="modalName" class="text-xl font-bold text-stone-900 truncate">Contact Name</h2>
                    <p id="modalEmailSubtitle" class="text-xs font-medium text-stone-400 mt-1">email@example.com</p>
                    <div class="flex justify-center mt-2.5">
                        <span id="modalFavorite" class="px-3 py-1 rounded-full text-[10px] font-bold tracking-wider uppercase">Starred</span>
                    </div>
                </div>

                <!-- Parameters Card Info -->
                <div class="space-y-3.5 text-left mb-6">
                    
                    <!-- Phone -->
                    <div class="p-3 bg-stone-50 border border-stone-100 rounded-xl flex items-center gap-3">
                        <div class="w-8 h-8 bg-white border border-stone-200/60 rounded-lg flex items-center justify-center shrink-0">
                            <i class="fa-solid fa-phone text-stone-600 text-xs"></i>
                        </div>
                        <div class="min-w-0">
                            <span class="text-[9px] font-bold text-stone-400 uppercase tracking-wider block">Phone Number</span>
                            <span id="modalPhone" class="text-xs font-semibold text-stone-850 truncate block">1234567890</span>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="p-3 bg-stone-50 border border-stone-100 rounded-xl flex items-center gap-3">
                        <div class="w-8 h-8 bg-white border border-stone-200/60 rounded-lg flex items-center justify-center shrink-0">
                            <i class="fa-regular fa-envelope text-stone-600 text-xs"></i>
                        </div>
                        <div class="min-w-0">
                            <span class="text-[9px] font-bold text-stone-400 uppercase tracking-wider block">Email Address</span>
                            <span id="modalEmail" class="text-xs font-semibold text-stone-850 truncate block">email@example.com</span>
                        </div>
                    </div>

                    <!-- Website -->
                    <div class="p-3 bg-stone-50 border border-stone-100 rounded-xl flex items-center gap-3">
                        <div class="w-8 h-8 bg-white border border-stone-200/60 rounded-lg flex items-center justify-center shrink-0">
                            <i class="fa-solid fa-globe text-stone-600 text-xs"></i>
                        </div>
                        <div class="min-w-0">
                            <span class="text-[9px] font-bold text-stone-400 uppercase tracking-wider block">Website URL</span>
                            <a id="modalWebsite" target="_blank" rel="noopener noreferrer"
                               class="text-xs font-semibold text-stone-900 hover:underline truncate block">https://website.com</a>
                        </div>
                    </div>

                    <!-- LinkedIn -->
                    <div class="p-3 bg-stone-50 border border-stone-100 rounded-xl flex items-center gap-3">
                        <div class="w-8 h-8 bg-white border border-stone-200/60 rounded-lg flex items-center justify-center shrink-0">
                            <i class="fa-brands fa-linkedin text-stone-600 text-xs"></i>
                        </div>
                        <div class="min-w-0">
                            <span class="text-[9px] font-bold text-stone-400 uppercase tracking-wider block">LinkedIn Profile</span>
                            <a id="modalLinkedIn" target="_blank" rel="noopener noreferrer"
                               class="text-xs font-semibold text-stone-900 hover:underline truncate block">View Profile</a>
                        </div>
                    </div>

                </div>

                <!-- Footer close -->
                <div class="flex items-center justify-center pt-2">
                    <button id="closeModalBottom" type="button"
                            class="px-5 py-2 border border-stone-200 hover:bg-stone-50 text-stone-600 font-semibold rounded-xl text-xs sm:text-sm transition-all shadow-xs">
                        Close Profile
                    </button>
                </div>

            </div>

        </div>

    </div>

</div>
